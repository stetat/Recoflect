<div class="limit-card">

  <div class="limit-header">
    <span class="limit-label">Weekly limit</span>
    @if(budgetLimit() > 80.0) {
      <span class="status-badge status-warn">Watch out</span>
    } @else if(budgetLimit() > 40.0) {
      <span class="status-badge status-ok">Well planned</span>
    } @else {
      <span class="status-badge status-save">Saving well</span>
    }
  </div>

  <div class="bar-track">
    <div class="bar-fill" [style.width.%]="budgetLimit()"></div>
  </div>

  <div class="limit-footer">
    <span class="limit-pct">{{budgetLimit()}}% of budget used</span>
    @if(budgetLimit() > 80.0) {
      <span class="limit-caption warn-text">Watch your spending</span>
    } @else if(budgetLimit() > 40.0) {
      <span class="limit-caption ok-text">You still have room</span>
    } @else {
      <span class="limit-caption save-text">You're saving decently</span>
    }
  </div>

</div>
